name: Jarvis

options:
  bundleIdPrefix: com.jarvis
  deploymentTarget:
    macOS: "26.0"

packages:
  JarvisKit:
    path: Packages/JarvisKit
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  Jarvis:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App
    dependencies:
      - package: JarvisKit
        products:
          - JStore
          - JAgent
          - JSpeech
          - JKnowledge
          - JWorlds
          - JMind
          - JControl
          - JScreen
          - JProactive
          - JLocal
      - package: MarkdownUI
        products:
          - MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Jarvis
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Jarvis uses the microphone for voice input when you hold Option to talk."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Jarvis transcribes your voice on-device to understand what you say."
        INFOPLIST_KEY_NSAudioCaptureUsageDescription: "Jarvis captures system audio to transcribe meetings on-device when you enable meeting capture."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Jarvis reads and adds calendar events when you ask it to."
        INFOPLIST_KEY_NSContactsUsageDescription: "Jarvis reads your contacts to recognize the people in your life."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Jarvis reads and adds reminders when you ask it to."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Jarvis controls apps like Mail and Notes on your behalf when you ask it to."
        SWIFT_VERSION: "6.0"
        ENABLE_APP_INTENTS_METADATA_GENERATION: YES
        CODE_SIGN_STYLE: Automatic
        # Stable signing identity: keeps the app's designated requirement the
        # same across rebuilds, so Keychain access survives (no re-prompts) and
        # the data-protection keychain (entitlement-gated, dialog-free) works.
        DEVELOPMENT_TEAM: A9P2388PHM
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: App/Jarvis.entitlements
        INFOPLIST_KEY_CFBundleShortVersionString: "0.1"
